<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>sgf-render WASM demo</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem;
    line-height: 1.45;
  }
  h1 { margin: 0 0 .25rem 0; font-size: 1.4rem; }
  .sub { color: #888; margin-bottom: 1rem; font-size: .9rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .col { display: flex; flex-direction: column; min-height: 0; }
  textarea {
    width: 100%; min-height: 320px; font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; padding: .5rem; box-sizing: border-box;
  }
  .controls {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: .5rem .75rem; margin: .75rem 0;
  }
  .controls label { display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
  .controls input, .controls select {
    padding: .25rem .4rem; font: inherit;
  }
  button { padding: .4rem .9rem; cursor: pointer; }
  #out {
    border: 1px solid #ccc; padding: .5rem; min-height: 320px;
    display: flex; align-items: center; justify-content: center;
    background: #fafafa;
  }
  #out svg { max-width: 100%; height: auto; }
  pre.err {
    color: #b00; white-space: pre-wrap; font-size: 12px;
    background: #fee; padding: .5rem; border-radius: 4px; margin: .5rem 0;
  }
  .meta { font-size: 11px; color: #888; margin-top: .25rem; }
</style>
</head>
<body>
<h1>sgf-render — WebAssembly demo</h1>
<div class="sub">SGF 기보를 SVG로 렌더링합니다. <span id="ver"></span></div>

<div class="row">
  <div class="col">
    <label style="font-size:12px;font-weight:600;margin-bottom:4px">SGF 입력</label>
    <textarea id="sgf" spellcheck="false"></textarea>

    <div class="controls">
      <label>Style
        <select id="style">
          <option value="simple" selected>simple</option>
          <option value="fancy">fancy</option>
          <option value="minimalist">minimalist</option>
        </select>
      </label>
      <label>Width (px)
        <input id="width" type="number" value="800" min="100" max="4000" step="50" />
      </label>
      <label>Node number
        <input id="nodeNumber" type="text" value="last" placeholder="last 또는 숫자" />
      </label>
      <label>Variation
        <input id="variation" type="number" value="0" min="0" />
      </label>
      <label>Label sides
        <input id="labelSides" type="text" value="nw" placeholder="예: nw, nesw" />
      </label>
      <label>Range
        <input id="range" type="text" placeholder="예: cc-ff (옵션)" />
      </label>
      <label><input id="shrinkWrap" type="checkbox" /> shrink wrap</label>
      <label><input id="kifu" type="checkbox" /> kifu (전체 수순)</label>
      <label>Move numbers
        <input id="moveNumbers" type="text" placeholder="예: 1, 1-50 (옵션)" />
      </label>
      <label><input id="lenient" type="checkbox" /> lenient parse</label>
    </div>

    <div>
      <button id="render">Render</button>
      <button id="download">Download SVG</button>
    </div>
    <pre id="err" class="err" style="display:none"></pre>
    <div class="meta" id="meta"></div>
  </div>

  <div class="col">
    <label style="font-size:12px;font-weight:600;margin-bottom:4px">SVG 출력</label>
    <div id="out"><span style="color:#888">렌더 결과가 여기에 표시됩니다.</span></div>
  </div>
</div>

<script type="module">
import init, { renderSgf, version } from "./pkg/sgf_render.js";

const SAMPLE = `(;GM[1]FF[4]CA[UTF-8]SZ[19]ST[2]RU[Chinese]KM[7.5]
;B[pd];W[dp];B[cd];W[qp];B[op];W[oq];B[nq];W[pq];B[cn];W[fq];B[mp];W[qn]
;B[qm];W[pn];B[nc];W[rd];B[qc];W[ce];B[bp];W[cq];B[bq];W[br];B[cp];W[bo]
;B[dq];W[dr];B[cr];W[er];B[bs];W[ap])`;

const $ = (id) => document.getElementById(id);

async function boot() {
  await init();
  $("ver").textContent = `(sgf-render v${version()})`;
  $("sgf").value = SAMPLE;
  render();
}

function readOptions() {
  const opts = {
    width: Number($("width").value) || 800,
    style: $("style").value,
    variation: Number($("variation").value) || 0,
    nodeNumber: $("nodeNumber").value.trim() || "last",
    labelSides: $("labelSides").value.trim(),
    shrinkWrap: $("shrinkWrap").checked,
    kifu: $("kifu").checked,
    lenient: $("lenient").checked,
  };
  const r = $("range").value.trim();
  if (r) opts.range = r;
  const m = $("moveNumbers").value.trim();
  if (m) {
    // accept "1", "1-50", or "all"
    if (m === "all" || m === "true") opts.moveNumbers = true;
    else if (/^\d+$/.test(m)) opts.moveNumbers = parseInt(m, 10);
    else opts.moveNumbers = m;
  }
  return opts;
}

function render() {
  const errEl = $("err");
  const out = $("out");
  const meta = $("meta");
  errEl.style.display = "none";
  try {
    const t0 = performance.now();
    const svg = renderSgf($("sgf").value, readOptions());
    const t1 = performance.now();
    out.innerHTML = svg;
    meta.textContent = `렌더 시간: ${(t1 - t0).toFixed(1)} ms · SVG ${svg.length.toLocaleString()} 바이트`;
  } catch (e) {
    errEl.textContent = String(e?.message ?? e);
    errEl.style.display = "block";
    out.innerHTML = '<span style="color:#888">에러 발생</span>';
    meta.textContent = "";
  }
}

function download() {
  const out = $("out");
  const svg = out.querySelector("svg");
  if (!svg) return;
  const blob = new Blob([svg.outerHTML], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "diagram.svg";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

$("render").addEventListener("click", render);
$("download").addEventListener("click", download);
$("sgf").addEventListener("input", () => {
  // live re-render on input, debounced
  clearTimeout(window.__t);
  window.__t = setTimeout(render, 250);
});
for (const id of ["style","width","nodeNumber","variation","labelSides","range","shrinkWrap","kifu","moveNumbers","lenient"]) {
  $(id).addEventListener("change", render);
}

boot();
</script>
</body>
</html>
