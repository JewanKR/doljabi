reportAnalysisWinratesAs = BLACK
maxVisits = 50
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 2
nnMaxBatchSize = 4
nnCacheSizePowerOfTwo = 18
nnMutexPoolSizePowerOfTwo = 14
# Logging: no log file is written to the virtual FS. Instead the engine log is
# echoed to stderr, which the worker forwards to the browser console. Requests
# and responses are logged on the JS side (useKataGo) with timing, so the raw
# engine request/response dumps are kept off here to avoid flooding the console.
logToStderr = true
logAllRequests = false
logAllResponses = false
logSearchInfo = false
